<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="50%" style="stop-color:#4a7cff"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feFlood flood-color="#00e5ff" flood-opacity="0.3"/>
      <feComposite in2="b" operator="in" result="gl"/>
      <feMerge><feMergeNode in="gl"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="40" height="40" rx="8" fill="#0f1424"/>
  <rect width="40" height="40" rx="8" fill="url(#ig)" opacity="0.12"/>
  <!-- Code brackets -->
  <path d="M8 13 L4 20 L8 27" stroke="#00e5ff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#g)" opacity="0.7"/>
  <path d="M32 13 L36 20 L32 27" stroke="#7c4dff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#g)" opacity="0.7"/>
  <!-- BM text -->
  <text x="20" y="26" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="900" fill="url(#ig)" text-anchor="middle" filter="url(#g)">BM</text>
  <!-- Circuit dots -->
  <circle cx="11" cy="8" r="1.5" fill="#00e5ff" opacity="0.6"/>
  <circle cx="29" cy="8" r="1.5" fill="#7c4dff" opacity="0.6"/>
  <line x1="11" y1="9.5" x2="11" y2="13" stroke="#00e5ff" stroke-width="0.7" opacity="0.4"/>
  <line x1="29" y1="9.5" x2="29" y2="13" stroke="#7c4dff" stroke-width="0.7" opacity="0.4"/>
  <!-- Bottom accent line -->
  <rect x="12" y="32" width="16" height="1" rx="0.5" fill="url(#ig)" opacity="0.4"/>
</svg>
