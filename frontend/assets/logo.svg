<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 180" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a7cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c4dff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7cff;stop-opacity:1" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00e5ff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feFlood flood-color="#4a7cff" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circuit traces background -->
  <g opacity="0.25" stroke="url(#textGrad)" stroke-width="0.8" fill="none">
    <!-- Horizontal circuit lines -->
    <line x1="20" y1="30" x2="80" y2="30"/>
    <line x1="280" y1="30" x2="340" y2="30"/>
    <line x1="30" y1="90" x2="60" y2="90"/>
    <line x1="300" y1="90" x2="330" y2="90"/>
    <line x1="40" y1="60" x2="70" y2="60"/>
    <line x1="290" y1="60" x2="320" y2="60"/>
    <!-- Vertical connectors -->
    <line x1="60" y1="45" x2="60" y2="75"/>
    <line x1="300" y1="45" x2="300" y2="75"/>
    <!-- Circuit nodes -->
    <circle cx="80" cy="30" r="2.5" fill="#00e5ff"/>
    <circle cx="280" cy="30" r="2.5" fill="#4a7cff"/>
    <circle cx="60" cy="90" r="2" fill="#00e5ff"/>
    <circle cx="300" cy="90" r="2" fill="#4a7cff"/>
    <circle cx="60" cy="45" r="2" fill="#00e5ff"/>
    <circle cx="300" cy="45" r="2" fill="#4a7cff"/>
    <circle cx="40" cy="60" r="1.5" fill="#00e5ff"/>
    <circle cx="320" cy="60" r="1.5" fill="#4a7cff"/>
    <!-- Additional circuit details -->
    <path d="M70 60 L80 60 L80 50 L90 50"/>
    <path d="M270 60 L280 60 L280 50 L290 50"/>
    <circle cx="90" cy="50" r="2" fill="#7c4dff"/>
    <circle cx="270" cy="60" r="2" fill="#7c4dff"/>
  </g>

  <!-- BMA Letters -->
  <g filter="url(#neon)">
    <!-- B -->
    <text x="95" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900" fill="url(#glow)" letter-spacing="-2">B</text>
    <!-- M -->
    <text x="148" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900" fill="url(#glow)" letter-spacing="-2">M</text>
    <!-- A with code angle bracket style -->
    <text x="222" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="900" fill="url(#glow)" letter-spacing="-2">A</text>
  </g>

  <!-- Code bracket accents on A -->
  <g filter="url(#neonSoft)">
    <path d="M270 40 L285 55 L270 70" stroke="#00e5ff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M90 40 L75 55 L90 70" stroke="#7c4dff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Connection dots on letters -->
  <g>
    <circle cx="115" cy="40" r="3" fill="#00e5ff" opacity="0.9"/>
    <circle cx="175" cy="35" r="2.5" fill="#4a7cff" opacity="0.9"/>
    <circle cx="240" cy="40" r="3" fill="#7c4dff" opacity="0.9"/>
    <!-- Small connecting lines from dots -->
    <line x1="115" y1="43" x2="115" y2="52" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
    <line x1="175" y1="38" x2="175" y2="50" stroke="#4a7cff" stroke-width="1" opacity="0.5"/>
    <line x1="240" y1="43" x2="240" y2="52" stroke="#7c4dff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- BUGMind AI text -->
  <text x="180" y="125" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="3" filter="url(#neonSoft)">BUGMind AI</text>

  <!-- Subtle underline -->
  <rect x="100" y="135" width="160" height="1.5" rx="1" fill="url(#textGrad)" opacity="0.4"/>

  <!-- Small circuit details at bottom -->
  <g opacity="0.2" stroke="url(#textGrad)" stroke-width="0.6" fill="none">
    <line x1="100" y1="150" x2="140" y2="150"/>
    <line x1="220" y1="150" x2="260" y2="150"/>
    <circle cx="140" cy="150" r="1.5" fill="#00e5ff"/>
    <circle cx="220" cy="150" r="1.5" fill="#4a7cff"/>
    <line x1="140" y1="150" x2="150" y2="160"/>
    <line x1="220" y1="150" x2="210" y2="160"/>
  </g>
</svg>
