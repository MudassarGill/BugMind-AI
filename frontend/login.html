<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to BugMind AI - Your AI-powered coding assistant">
  <title>BugMind AI — Login</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>html, body { overflow: auto; height: auto; }</style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/logo.svg" alt="BugMind AI" class="auth-logo-img">
      </div>
      <p class="auth-subtitle">Welcome back! Login to continue coding.</p>

      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-icon">
            <span class="icon"><i class="fas fa-envelope"></i></span>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon">
            <span class="icon"><i class="fas fa-lock"></i></span>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
          </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
          <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px; color:var(--text-secondary); text-transform:none; letter-spacing:0;">
            <input type="checkbox" style="width:auto; accent-color:var(--accent-blue);">
            Remember me
          </label>
          <a href="#" style="font-size:13px;">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="btn-login">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      <div class="form-divider">or continue with</div>

      <div style="display:flex; gap:10px; margin-bottom:20px;">
        <button class="btn-social" id="btn-github" style="flex:1;">
          <i class="fab fa-github"></i> GitHub
        </button>
        <button class="btn-social" id="btn-google" style="flex:1;">
          <i class="fab fa-google"></i> Google
        </button>
      </div>

      <p class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000/api';

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-login');

      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
      btn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');

        localStorage.setItem('bugmind_token', data.token);
        localStorage.setItem('bugmind_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } catch (err) {
        if (err.message === 'Failed to fetch') {
          showError('Backend not running. Run: cd backend && python main.py');
        } else {
          showError(err.message);
        }
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
        btn.disabled = false;
      }
      return false;
    }

    function showError(msg) {
      let existing = document.querySelector('.auth-error');
      if (existing) existing.remove();
      const div = document.createElement('div');
      div.className = 'auth-error';
      div.style.cssText = 'background:var(--accent-red-dim); color:var(--accent-red); padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:flex; align-items:center; gap:8px; animation:cardFadeIn 0.3s ease;';
      div.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + msg;
      document.getElementById('login-form').prepend(div);
      setTimeout(() => div.remove(), 5000);
    }

    // Social login mock
    document.getElementById('btn-github')?.addEventListener('click', () => showError('GitHub login coming soon!'));
    document.getElementById('btn-google')?.addEventListener('click', () => showError('Google login coming soon!'));
  </script>
</body>
</html>
