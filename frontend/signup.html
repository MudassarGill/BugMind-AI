<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your BugMind AI account - Start learning to code smarter">
  <title>BugMind AI — Sign Up</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🧠</div>
        <h1>BugMind AI</h1>
      </div>
      <p class="auth-subtitle">Create your account and start coding smarter.</p>

      <form id="signup-form" onsubmit="return handleSignup(event)">
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <div class="input-icon">
            <span class="icon"><i class="fas fa-user"></i></span>
            <input type="text" id="fullname" placeholder="Mudassar Hussain" required autocomplete="name">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-icon">
            <span class="icon"><i class="fas fa-envelope"></i></span>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon">
            <span class="icon"><i class="fas fa-lock"></i></span>
            <input type="password" id="password" placeholder="Create a strong password" required minlength="6" autocomplete="new-password">
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="input-icon">
            <span class="icon"><i class="fas fa-shield-alt"></i></span>
            <input type="password" id="confirm-password" placeholder="Confirm your password" required autocomplete="new-password">
          </div>
        </div>

        <button type="submit" class="btn-primary" id="btn-signup">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>

      <div class="form-divider">or sign up with</div>

      <button class="btn-social" id="btn-github">
        <i class="fab fa-github"></i> GitHub
      </button>
      <button class="btn-social" id="btn-google">
        <i class="fab fa-google"></i> Google
      </button>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </div>

  <script>
    function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('fullname').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) {
        showError('Passwords do not match!');
        return false;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return false;
      }

      // Mock signup - store in localStorage
      const users = JSON.parse(localStorage.getItem('bugmind_users') || '[]');
      
      if (users.find(u => u.email === email)) {
        showError('An account with this email already exists.');
        return false;
      }

      const newUser = {
        id: Date.now(),
        name,
        email,
        password,
        createdAt: new Date().toISOString(),
        stats: { totalErrors: 0, codeRuns: 0, errorTypes: {} }
      };

      users.push(newUser);
      localStorage.setItem('bugmind_users', JSON.stringify(users));
      localStorage.setItem('bugmind_current_user', JSON.stringify(newUser));
      
      showSuccess('Account created! Redirecting...');
      setTimeout(() => window.location.href = 'index.html', 1500);
      return false;
    }

    function showError(msg) {
      let existing = document.querySelector('.auth-error');
      if (existing) existing.remove();
      
      const div = document.createElement('div');
      div.className = 'auth-error';
      div.style.cssText = 'background:var(--accent-red-dim); color:var(--accent-red); padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:flex; align-items:center; gap:8px; animation:cardFadeIn 0.3s ease;';
      div.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + msg;
      document.getElementById('signup-form').prepend(div);
      setTimeout(() => div.remove(), 5000);
    }

    function showSuccess(msg) {
      let existing = document.querySelector('.auth-success');
      if (existing) existing.remove();
      
      const div = document.createElement('div');
      div.className = 'auth-success';
      div.style.cssText = 'background:var(--accent-green-dim); color:var(--accent-green); padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px; display:flex; align-items:center; gap:8px; animation:cardFadeIn 0.3s ease;';
      div.innerHTML = '<i class="fas fa-check-circle"></i> ' + msg;
      document.getElementById('signup-form').prepend(div);
    }
  </script>
</body>
</html>
